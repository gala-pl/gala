name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build release binaries
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --workspace

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gala-${{ matrix.os }}
          path: target/release/gala
          retention-days: 7

  publish:
    name: Publish crates to crates.io
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Publish gala-core
        run: cargo publish -p gala-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gala-span
        run: cargo publish -p gala-span
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gala-diagnostics
        run: cargo publish -p gala-diagnostics
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gala-lexer
        run: cargo publish -p gala-lexer
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gala-ast
        run: cargo publish -p gala-ast
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gala-parser
        run: cargo publish -p gala-parser
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gala-std
        run: cargo publish -p gala-std
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gala-fmt
        run: cargo publish -p gala-fmt
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gala-lsp
        run: cargo publish -p gala-lsp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes from CHANGELOG
        run: |
          if [ -f CHANGELOG.md ]; then
            awk '/^## /{if(seen) exit; seen=1} seen{print}' CHANGELOG.md > release-notes.md
          else
            echo "CHANGELOG.md not found — using auto-generated notes" > release-notes.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          generate_release_notes: true
          files: |
            target/release/gala
