# cargo-deny configuration
# See https://embarkstudios.github.io/cargo-deny/ for all options.

[advisories]
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
severity-threshold = "low"
ignore = []

[licenses]
unlicensed = "deny"
allow = [
    "Apache-2.0",
    "MIT",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "Unicode-3.0",
    "BSL-1.0",
    "Zlib",
    "0BSD",
]
deny = []
exceptions = []

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
skip-tree = []
