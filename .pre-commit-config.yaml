# See https://pre-commit.com for documentation.
#
# Install:  pre-commit install
# Run all:  pre-commit run --all-files
# Run one:  pre-commit run <hook-id> --all-files

repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-added-large-files
        args: [--maxkb=2048]

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        description: Format Rust source code with rustfmt.
        entry: cargo fmt --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        description: Lint Rust source code with Clippy.
        entry: cargo clippy -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-check
        name: cargo check
        description: Check that the workspace compiles without warnings.
        entry: cargo check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        description: Run the test suite.
        entry: cargo test
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]
